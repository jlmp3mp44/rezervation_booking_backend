spring.config.import=optional:classpath:secret.properties
server.port=8080

spring.application.name=horovod-hub-backend

# PostgreSQL
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.globally_quoted_identifiers=true

# Horovod settings
horovod.max-concurrent-per-slot=2
horovod.max-log-entries=50
horovod.calendar-start-hour=8
horovod.calendar-end-hour=24
horovod.email-enabled=false

horovod.oauth.google.client-id=${OAUTH_GOOGLE_CLIENT_ID:}
horovod.oauth.google.client-secret=${OAUTH_GOOGLE_CLIENT_SECRET:}
horovod.oauth.google.redirect-uri=${OAUTH_GOOGLE_REDIRECT_URI:http://localhost:8080/api/auth/google}
horovod.jwt.secret=${JWT_SECRET:super_secret_jwt_key_that_should_be_long_enough_to_be_secure}